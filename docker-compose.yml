
services:
  redis:
    image: redis:7-alpine
    container_name: verge-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  db:
    image: postgres:16-alpine
    container_name: verge-db
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=Verge
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: always

  market-data:
    build:
      context: ./python-service
    container_name: verge-python-ai
    ports:
      - "8005:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MODEL_PATH=xgboost_v1.json
    depends_on:
      - redis
    restart: always

  dotnet-backend:
    build:
      context: .
      dockerfile: src/Verge.HttpApi.Host/Dockerfile
    container_name: verge-dotnet-backend
    ports:
      - "5000:8080"
      - "5001:443"
    env_file:
      - ./python-service/.env
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - Redis:Configuration=redis:6379
      - ConnectionStrings:Default=Host=db;Port=5432;Database=Verge;Username=postgres;Password=postgres;Pooling=true;TrustServerCertificate=true
      - PythonService__Url=http://market-data:8000
      - BINANCE_API_KEY=${BINANCE_API_KEY}
      - BINANCE_API_SECRET=${BINANCE_API_SECRET}
    depends_on:
      - redis
      - db
      - market-data
    restart: always

volumes:
  redis_data:
  pg_data:
