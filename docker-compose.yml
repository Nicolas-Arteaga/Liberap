
services:
  redis:
    image: redis:7-alpine
    container_name: verge-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  db:
    image: postgres:16-alpine
    container_name: verge-db
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=Verge
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: always

  market-data:
    build:
      context: ./python-service
    container_name: verge-python-ai
    ports:
      - "8005:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MODEL_PATH=xgboost_v1.json
    depends_on:
      - redis
    restart: always

  market-ws:
    build:
      context: .
      dockerfile: agent/Dockerfile.market-ws
    image: verge-market-ws
    container_name: verge-market-ws
    env_file:
      - ./python-service/.env
    environment:
      - BINANCE_API_KEY=${BINANCE_API_KEY}
      - BINANCE_API_SECRET=${BINANCE_API_SECRET}
    ports:
      - "8001:8001"
    volumes:
      - market_ws_data:/app/data
    restart: always

  # El backend se corre localmente en el host, no en Docker.

volumes:
  redis_data:
  pg_data:
  market_ws_data:
