<div class="forzar-acciones-panel" *ngIf="(pollService.status$ | async)?.activePairs?.length">
  <div class="panel-header">
    <h3>Forzar Acciones (IA)</h3>
  </div>

  <div class="table-responsive">
    <table class="signals-table">
      <thead>
        <tr>
          <th>Par</th>
          <th class="text-center">Score</th>
          <th class="text-end">Acciones</th>
        </tr>
      </thead>
      <tbody>
        <ng-container *ngIf="pollService.status$ | async as status">
          <tr *ngFor="let pair of status.activePairs">
            <td class="pair-cell">
              <span class="pair-name">{{ pair.replace('/USDT:USDT', 'USDT') }}</span>
              <span class="bot-label">FreqAI Scanner</span>
            </td>
            <td class="score-cell text-center">
              <span class="score-badge" [class.high]="getScoreForPair(pair) >= 70" [class.low]="getScoreForPair(pair) < 50">
                {{ getScoreForPair(pair) }}
              </span>
            </td>
            <td class="actions-cell text-end">
              <button class="btn-force-long" (click)="forceEnter(pair, 'long')" [disabled]="isForcingTrade || !status.isRunning">
                Long
              </button>
              <button class="btn-force-short" (click)="forceEnter(pair, 'short')" [disabled]="isForcingTrade || !status.isRunning">
                Short
              </button>
            </td>
          </tr>
        </ng-container>
      </tbody>
    </table>
  </div>
</div>

<div class="forzar-acciones-panel empty" *ngIf="!(pollService.status$ | async)?.activePairs?.length">
  <p class="text-muted text-center py-4">No hay pares activos en el scanner.</p>
</div>
