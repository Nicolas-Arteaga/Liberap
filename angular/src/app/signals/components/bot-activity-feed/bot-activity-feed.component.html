<div class="activity-feed-container glass-box">
  <div class="feed-header">
    <div class="title">
      <ion-icon name="terminal-outline"></ion-icon>
      <h3>BOT ACTIVITY LIVE</h3>
    </div>
    <div class="pulse-indicator">
      <div class="dot pulse"></div>
      LIVE
    </div>
  </div>

  <div class="feed-content" #scrollContainer>
    <div class="log-entry" *ngFor="let log of logs().slice().reverse(); trackBy: trackByLog">
      <span class="timestamp">[{{ 'now' | date:'HH:mm:ss' }}]</span>
      <ion-icon [name]="getIcon(log)"></ion-icon>
      <span class="message">{{ log }}</span>
    </div>

    <div class="empty-feed" *ngIf="logs().length === 0">
      <ion-icon name="pulse-outline" class="spin"></ion-icon>
      <p>Esperando señales del bot...</p>
    </div>
  </div>
</div>
