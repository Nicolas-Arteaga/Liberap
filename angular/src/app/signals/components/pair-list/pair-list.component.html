<div class="pair-list-container">
  <div class="table-header">
    <div class="col-symbol">Par</div>
    <div class="col-score">Super Score</div>
    <div class="col-pred">FreqAI Pred</div>
    <div class="col-bias">Bias (HMA50)</div>
    <div class="col-atr">ATR %</div>
    <div class="col-action">Action</div>
  </div>

  <div class="table-body">
    <div class="pair-row-wrapper" *ngFor="let pair of pairs; trackBy: trackBySymbol">
      <div class="pair-card" 
           [class.selected]="selectedSymbol() === pair.symbol"
           [class.hot-signal]="pair.score >= 90"
           [class.updated-pulse]="lastUpdatedSymbol() === pair.symbol"
           (click)="selectPair(pair)">
        
        <div class="col-symbol">
          <span class="symbol-text">{{ formatSymbol(pair.symbol) }}</span>
          <span class="hot-badge" *ngIf="pair.score >= 85">
            <ion-icon name="flame"></ion-icon> HOT
          </span>
        </div>
        
        <div class="col-score">
          <div class="score-container">
            <div class="score-label" [style.color]="getScoreColor(pair.score)">
              {{ pair.score }}
            </div>
            <div class="score-progress">
              <div class="progress-fill" 
                   [style.width.%]="pair.score"
                   [style.background]="getScoreFillGradient(pair.score)">
              </div>
            </div>
          </div>
        </div>

        <div class="col-pred" [class.positive]="pair.prediction > 0" [class.negative]="pair.prediction < 0">
          <span class="pred-trend">
            <ion-icon [name]="pair.prediction > 0 ? 'trending-up' : 'trending-down'"></ion-icon>
            {{ pair.prediction > 0 ? '+' : '' }}{{ pair.prediction }}%
          </span>
        </div>

        <div class="col-bias">
          <div class="bias-indicator" [style.background]="getBiasColor(pair.bias, 0.1)" [style.color]="getBiasColor(pair.bias)">
            <span class="bias-dot" [style.background]="getBiasColor(pair.bias)"></span>
            {{ pair.bias }}
          </div>
        </div>

        <div class="col-atr">
          <span class="atr-value">{{ pair.atr | number:'1.1-2' }}%</span>
          <span class="atr-label">ATR Vol</span>
        </div>

        <div class="col-action">
          <button *ngIf="pair.recommendedAction !== 'WAIT'" 
                  class="action-btn" [ngClass]="pair.recommendedAction | lowercase"
                  (click)="createOrder($event, pair, pair.recommendedAction === 'LONG' ? 'LONG' : 'SHORT')">
            {{ pair.recommendedAction }}
          </button>
          <span *ngIf="pair.recommendedAction === 'WAIT'" class="wait-label">WAIT</span>
        </div>
      </div>
    </div>
  </div>
</div>
