<div class="bot-v2-container">
  <!-- Metrics Bar -->
  <app-bot-stats-bar class="metrics-bar"></app-bot-stats-bar>

  <!-- Main Grid (3 Columns) -->
  <main class="dashboard-grid">
    <!-- Left Column: Create Bot -->
    <aside class="left-column">
      <app-create-bot-form></app-create-bot-form>
    </aside>

    <!-- Center Column: Chart & Active List -->
    <section class="center-column">
      <app-trade-panel [pair]="displayPair()"></app-trade-panel>
      <app-active-bots-table></app-active-bots-table>
    </section>

    <!-- Right Column: Control & Mini List -->
    <div class="right-column">
      <app-bot-control-panel></app-bot-control-panel>
      <app-forzar-acciones-panel></app-forzar-acciones-panel>
    </div>
  </main>
</div>
