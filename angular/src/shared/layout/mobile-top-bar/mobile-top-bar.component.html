<ion-header class="deudaso-header ion-no-border">
  <ion-toolbar class="header-toolbar">

    <div class="header-content">
      <!-- Logo en lugar de texto -->
      <div class="logo-container">
        <img src="assets/images/logo/logo.png" alt="Verge Logo" class="logo-image" height="32">
      </div>

      <div class="d-flex align-items-center gap-2">
        <ion-button fill="clear" class="notification-btn position-relative"
          (click)="toggleNotificationPanel(); $event.stopPropagation()">
          <ion-icon name="notifications-outline"></ion-icon>
          <span class="badge position-absolute top-0 start-100 translate-middle rounded-pill bg-danger"
            *ngIf="unreadCount > 0"
            style="font-size: 0.65rem; transform: translate(-30%, 30%) !important; padding: 0.35em 0.5em;">
            {{ unreadCount }}
          </span>
        </ion-button>

        <ion-button fill="clear" class="profile-btn" (click)="onProfileClick()">
          <ion-icon name="person-outline"></ion-icon>
        </ion-button>
      </div>

    </div>

  </ion-toolbar>
</ion-header>

<!-- Backdrop para cerrar al hacer click fuera y asegurar visibilidad -->
<div class="panel-backdrop" *ngIf="showNotifications" (click)="showNotifications = false; $event.stopPropagation()">
</div>

<!-- Dropdown UI (Movido fuera de ion-header para evitar CUALQUIER clipping de Ionic) -->
<div class="notification-panel" *ngIf="showNotifications" (click)="$event.stopPropagation()">
  <div class="panel-header d-flex justify-content-between align-items-center mb-3">
    <h3 class="m-0 fs-6 text-white fw-bold">Notificaciones</h3>
    <button class="btn btn-link text-primary p-0 shadow-none text-decoration-none" style="font-size: 0.8rem;"
      (click)="markAllAsRead()">Marcar leídas</button>
  </div>

  <div class="panel-body">
    <app-alerts [alerts]="(notifications$ | async) || []" [showOnlyUnread]="false" mode="list"
      (alertClick)="onNotificationClick($event)" (markAsRead)="markAsRead($event)">
    </app-alerts>
  </div>
</div>
