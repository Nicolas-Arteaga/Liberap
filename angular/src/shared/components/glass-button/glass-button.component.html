<button
  class="glass-btn"
  [class.solid-btn]="variant === 'solid'"
  [class.danger-btn]="variant === 'danger'"
  [style.background]="variant === 'solid' ? color : null"
  [disabled]="disabled"
>
  <ion-icon *ngIf="icon" [name]="icon" class="me-2"></ion-icon>
  <span *ngIf="label">{{ label }}</span>
  <ng-content></ng-content>
</button>
